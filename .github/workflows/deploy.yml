name: Build and Deploy AMTools Backend

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'amtools-backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'amtools-backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: amtools-backend

jobs:
  # 测试作业
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./amtools-backend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: amtools-backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Run linting
      run: npm run lint || true

  # 构建和推送 Docker 镜像
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: ./amtools-backend
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: ./amtools-backend
        file: ./amtools-backend/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  # 部署到远程服务器
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to remote server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.REMOTE_SSH_KEY }}
        port: ${{ secrets.REMOTE_PORT || 22 }}
        script: |
          # 设置变量
          IMAGE_NAME="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:main"
          CONTAINER_NAME="amtools-backend"
          
          # 登录到 GitHub Container Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          
          # 拉取最新镜像
          docker pull $IMAGE_NAME
          
          # 停止并删除旧容器
          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true
          
          # 运行新容器
          docker run -d \
            --name $CONTAINER_NAME \
            --restart unless-stopped \
            -p 3000:3000 \
            --env-file /opt/amtools/.env \
            -v /opt/amtools/logs:/app/logs \
            -v /opt/amtools/uploads:/app/uploads \
            $IMAGE_NAME
          
          # 清理未使用的镜像
          docker image prune -f
          
          # 验证部署
          sleep 10
          curl -f http://localhost:3000/api/v1/health || exit 1
          
          echo "✅ 部署成功！"
